plugin: amazon.aws.aws_ec2

region:
- us-east-1

hostnames:
# This options allows displaying the public ip address.
- private-ip-address

filters:
  # This selects only running instances with tag `Environment` tag set to `dev`.
  tag:Name: ansible-server
  instance-state-name : running
